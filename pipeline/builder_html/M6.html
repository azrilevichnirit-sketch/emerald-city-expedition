<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'Heebo','Assistant',sans-serif;color:#fff}

.bg-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;transition:opacity 400ms ease-in-out}

#player-wrapper.landing-anchor{bottom:5%;right:30%;height:55%;transition:bottom 2000ms cubic-bezier(0.4,0,0.2,1),right 2000ms cubic-bezier(0.4,0,0.2,1),height 2000ms cubic-bezier(0.4,0,0.2,1)}
@keyframes player-jump{0%{transform:translateX(-50%) translateY(0) scale(1) rotate(0)}50%{transform:translateX(-50%) translateY(-12vh) scale(1.04) rotate(-2deg)}100%{transform:translateX(-50%) translateY(-6vh) scale(1.02) rotate(-1deg)}}
#player-canvas{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 200ms linear}
#player-canvas.visible{opacity:1}
.hidden-video{display:none}

.tool-wrapper.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.tool-wrapper.dimmed{opacity:0.3;pointer-events:none}
.tool-wrapper.flying{position:fixed;left:0;top:0;pointer-events:none;transition:none;z-index:25}
.tool-wrapper.attached{position:absolute;left:0;top:0;pointer-events:none;transition:none;z-index:20}
.tool-wrapper img{width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none}
.tool-canvas{width:100%;height:100%;display:block;user-select:none}
.tool-info-icon{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;font-size:0.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.4);z-index:21;cursor:pointer}
.tool-tooltip{position:absolute;bottom:calc(100% + 8px);right:0;background:rgba(0,0,0,0.85);color:#fff;padding:5px 10px;border-radius:6px;font-size:0.85rem;white-space:nowrap;direction:rtl;opacity:0;transition:opacity 150ms;pointer-events:none;z-index:50}
.tool-tooltip.visible{opacity:1}
#checkpoint-text{position:fixed;bottom:26vh;left:0;width:100%;text-align:center;color:#fff;direction:rtl;font-size:clamp(0.95rem,2.2vw,1.05rem);font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,0.9),0 2px 8px rgba(0,0,0,0.7);opacity:0;transition:opacity 400ms ease-in-out;z-index:30;padding:0 5%}
#checkpoint-text.visible{opacity:1}
#fade-overlay{position:fixed;inset:0;background:#000;opacity:0;transition:opacity 600ms linear;z-index:200;pointer-events:none}
#fade-overlay.visible{opacity:1}
</style>

const sceneBus=new EventTarget();

const SOUND={enabled:true,ambientNodes:{}};
function tryPlayAudio(file,volume){if(!file||file.startsWith('placeholder:'))return null;try{const a=new Audio(file);a.volume=volume!=null?volume:0.6;a.play().catch(()=>{});return a;}catch(e){return null;}}
function bindSoundEvents(){for(const ev of PAYLOAD.soundEvents||[]){sceneBus.addEventListener(ev.trigger,(e)=>{if(ev.trigger_filter&&ev.trigger_filter.slot&&(!e.detail||e.detail.slot!==ev.trigger_filter.slot))return;const d=ev.delay_after_trigger_ms||0;setTimeout(()=>tryPlayAudio(ev.audio_file,ev.volume),d);});}const a1=(PAYLOAD.soundAmbients||{}).phase_1_sky;const a2=(PAYLOAD.soundAmbients||{}).phase_2_jungle;if(a1)sceneBus.addEventListener('scene_entry',()=>SOUND.ambientNodes.a1=tryPlayAudio(a1.audio_file,a1.volume));if(a2)sceneBus.addEventListener('jump_apex',()=>{if(SOUND.ambientNodes.a1){try{SOUND.ambientNodes.a1.pause();}catch(e){}}SOUND.ambientNodes.a2=tryPlayAudio(a2.audio_file,a2.volume);});}
function chromaCanvasFromVideo(canvasEl,getActiveVideo){const ctx=canvasEl.getContext('2d');function tick(){const v=getActiveVideo();if(v&&v.readyState>=2){if(canvasEl.width!==v.videoWidth||canvasEl.height!==v.videoHeight){canvasEl.width=v.videoWidth;canvasEl.height=v.videoHeight;}try{ctx.drawImage(v,0,0,canvasEl.width,canvasEl.height);const frame=ctx.getImageData(0,0,canvasEl.width,canvasEl.height);const d=frame.data;for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];if(g>100&&g>r*1.4&&g>b*1.4)d[i+3]=0;}ctx.putImageData(frame,0,0);}catch(e){}canvasEl.classList.add('visible');}requestAnimationFrame(tick);}requestAnimationFrame(tick);}
function chromaCanvasFromImage(canvasEl,imgEl){function bake(){if(!imgEl.complete||!imgEl.naturalWidth)return;canvasEl.width=imgEl.naturalWidth;canvasEl.height=imgEl.naturalHeight;const ctx=canvasEl.getContext('2d');try{ctx.drawImage(imgEl,0,0);const frame=ctx.getImageData(0,0,canvasEl.width,canvasEl.height);const d=frame.data;for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];if(g>100&&g>r*1.4&&g>b*1.4)d[i+3]=0;}ctx.putImageData(frame,0,0);}catch(e){}}if(imgEl.complete)bake();else imgEl.addEventListener('load',bake,{once:true});}
const POSES={};let activePoseVideo=null;let currentTrack=null;
function getPoseVideo(filename){const id='pose-'+filename.replace('pose_','').replace('.mp4','');return document.getElementById(id);}
function preloadAllPoses(){const ids=(PAYLOAD.poseBaseFiles||[]).map(f=>'pose-'+f.replace('pose_','').replace('.mp4',''));return Promise.all(ids.map(id=>new Promise(resolve=>{const v=document.getElementById(id);POSES[id]=v;if(!v)return resolve();v.loop=false;v.muted=true;v.playsInline=true;if(v.readyState>=2)return resolve();const onReady=()=>{v.removeEventListener('loadedmetadata',onReady);resolve();};v.addEventListener('loadedmetadata',onReady);v.addEventListener('canplay',onReady,{once:true});setTimeout(resolve,1500);})));}
function startTrack(track){if(activePoseVideo&&activePoseVideo!==getPoseVideo(track.pose_file)){try{activePoseVideo.pause();}catch(e){}}currentTrack=track;const v=getPoseVideo(track.pose_file);activePoseVideo=v;if(!v)return;v.loop=false;const startSeek=()=>{try{v.currentTime=track.from_sec;}catch(e){}if(track.is_pose_hold&&track.from_sec===track.to_sec){v.pause();}else{v.play().catch(()=>{});}};if(v.readyState>=1)startSeek();else v.addEventListener('loadedmetadata',startSeek,{once:true});const wrapper=document.getElementById('player-wrapper');if(track.phase==='running_entry'){wrapper.classList.remove('facing-frontal');}else{wrapper.classList.add('facing-frontal');}}
function poseRafTick(){const v=activePoseVideo;const t=currentTrack;if(v&&t&&!v.paused&&v.readyState>=2){if(v.currentTime>=t.to_sec-0.005){const isLoop=!!t.loop_until_event&&PLAYER.awaitingEvent===t.loop_until_event;if(isLoop){try{v.currentTime=t.from_sec;}catch(e){}}else if(t.is_pose_hold){try{v.currentTime=t.to_sec;}catch(e){}v.pause();}else if(t.is_landing){try{v.currentTime=t.to_sec;}catch(e){}v.pause();const justEnded=t;currentTrack=null;emit('landing_complete',{phase:justEnded.phase});}else if(t.one_shot){try{v.currentTime=t.to_sec;}catch(e){}v.pause();const justEnded=t;currentTrack=null;emitTrackComplete(justEnded);}}}requestAnimationFrame(poseRafTick);}
function emitTrackComplete(track){if(track.phase==='catch_one_shot'){emit('catch_complete',{});}}
function setupBgPhaseSwap(){sceneBus.addEventListener('jump_apex',()=>{document.getElementById('bg-phase-1').style.opacity='0';document.getElementById('bg-phase-2').style.opacity='1';});}
function getRect(el){return el.getBoundingClientRect();}
function flyToolToPalm(toolEl,slot){const wrapper=document.getElementById('player-wrapper');const wRect=getRect(wrapper);const palmX=wRect.left+wRect.width*0.40;const palmY=wRect.top+wRect.height*0.32;const startRect=getRect(toolEl);const startX=startRect.left,startY=startRect.top,startW=startRect.width,startH=startRect.height;toolEl.classList.add('flying');toolEl.style.left=startX+'px';toolEl.style.top=startY+'px';toolEl.style.width=startW+'px';toolEl.style.height=startH+'px';const peakY=Math.min(startY,palmY)-80;const targetW=startW*0.50,targetH=startH*0.50;const targetX=palmX-targetW/2;const duration=PAYLOAD.timing.toolFlightMs;const startTime=performance.now();function tick(now){const linear=Math.min(1,(now-startTime)/duration);const t=linear;let eased=1-Math.pow(1-t,3);if(t<0.85)eased+=Math.sin(t*Math.PI)*0.08;eased=Math.max(0,Math.min(1.05,eased));const yArc=(1-t)*(1-t)*startY+2*(1-t)*t*peakY+t*t*(palmY-targetH/2);const x=startX+(targetX-startX)*eased;const w=startW+(targetW-startW)*eased;const h=startH+(targetH-startH)*eased;toolEl.style.left=x+'px';toolEl.style.top=yArc+'px';toolEl.style.width=w+'px';toolEl.style.height=h+'px';if(linear<1)requestAnimationFrame(tick);else attachToolToWrapper(toolEl,slot);}requestAnimationFrame(tick);}
function attachToolToWrapper(toolEl,slot){const wrapper=document.getElementById('player-wrapper');toolEl.classList.remove('flying');toolEl.classList.add('attached');wrapper.appendChild(toolEl);const tool=PAYLOAD.tools.find(t=>t.slot===slot);const a=tool.attach_at_catch;toolEl.style.left=`calc(${a.point_on_player_pct.x}% - ${(a.scale_factor*100)/2}%)`;toolEl.style.top=`calc(${a.point_on_player_pct.y}% - ${(a.scale_factor*100)/2}%)`;toolEl.style.width=`${a.scale_factor*100}%`;toolEl.style.height=`${a.scale_factor*100}%`;toolEl.style.zIndex='20';}
function applyToolUnfurl(slot){const tool=PAYLOAD.tools.find(t=>t.slot===slot);if(!tool)return;const wrapper=document.getElementById('player-wrapper');const toolEl=wrapper.querySelector('.tool-wrapper.attached');if(!toolEl)return;const a=tool.attach_at_catch,b=tool.attach_at_landing;const dur=400;const start=performance.now();if(tool.type==='deploy'||tool.type==='wear'){toolEl.style.zIndex='9';}function step(now){const t=Math.min(1,(now-start)/dur);const e=1-Math.pow(1-t,2);const x=a.point_on_player_pct.x+(b.point_on_player_pct.x-a.point_on_player_pct.x)*e;const y=a.point_on_player_pct.y+(b.point_on_player_pct.y-a.point_on_player_pct.y)*e;const s=a.scale_factor+(b.scale_factor-a.scale_factor)*e;toolEl.style.left=`calc(${x}% - ${(s*100)/2}%)`;toolEl.style.top=`calc(${y}% - ${(s*100)/2}%)`;toolEl.style.width=`${s*100}%`;toolEl.style.height=`${s*100}%`;if(t<1)requestAnimationFrame(step);}requestAnimationFrame(step);}
function buildTools(){const container=document.getElementById('zone-d');for(const tool of PAYLOAD.tools){const wrap=document.createElement('div');wrap.className='tool-wrapper';wrap.dataset.slot=tool.slot;const cvs=document.createElement('canvas');cvs.className='tool-canvas';wrap.appendChild(cvs);const img=new Image();img.crossOrigin='anonymous';img.alt=tool.label;img.draggable=false;img.onload=()=>chromaCanvasFromImage(cvs,img);img.src=tool.file;const ic=document.createElement('div');ic.className='tool-info-icon';ic.textContent='i';wrap.appendChild(ic);const tip=document.createElement('div');tip.className='tool-tooltip';tip.textContent=tool.label;wrap.appendChild(tip);ic.addEventListener('mouseenter',()=>tip.classList.add('visible'));ic.addEventListener('mouseleave',()=>tip.classList.remove('visible'));ic.addEventListener('click',(e)=>{e.stopPropagation();tip.classList.add('visible');setTimeout(()=>tip.classList.remove('visible'),2000);});wrap.addEventListener('click',(e)=>{if(e.target===ic)return;onToolClicked(tool.slot,wrap);});container.appendChild(wrap);}for(const tool of PAYLOAD.tools){setTimeout(()=>{const w=document.querySelector(`.tool-wrapper[data-slot="${tool.slot}"]`);if(w)w.classList.add('visible');},tool.in_ms);}}

function onToolClicked(slot,wrapEl){if(toolHasBeenClicked)return;toolHasBeenClicked=true;PLAYER.awaitingEvent=null;emit('tool_clicked',{slot});document.querySelectorAll('.tool-wrapper').forEach(el=>{if(el!==wrapEl)el.classList.add('dimmed');});wrapEl.animate([{transform:'scale(1)'},{transform:'scale(1.1)'},{transform:'scale(1)'}],{duration:200,easing:'ease-out'});document.getElementById('mission-text').classList.remove('visible');flyToolToPalm(wrapEl,slot);const catchTrack=PAYLOAD.tracks.find(t=>t.phase==='catch_one_shot');startTrack(catchTrack);}
const __busSlotListener=(e)=>{currentClickedSlot=e.detail&&e.detail.slot;};
function setupSequence(){const tracks=PAYLOAD.tracks;const T=id=>tracks.find(t=>t.phase===id);sceneBus.addEventListener('tool_clicked',__busSlotListener);sceneBus.addEventListener('catch_complete',()=>{const wrapper=document.getElementById('player-wrapper');const jumpHold=T('jump_css_overlay');startTrack(jumpHold);wrapper.classList.add('jumping');if(currentClickedSlot)applyToolUnfurl(currentClickedSlot);setTimeout(()=>emit('jump_apex',{}),PAYLOAD.timing.jumpApexOffsetFromCatchCompleteMs);});sceneBus.addEventListener('jump_apex',()=>{const wrapper=document.getElementById('player-wrapper');wrapper.classList.add('landing-anchor');const landTrack=T('landing');startTrack(landTrack);const rivals=document.getElementById('rivals-canvas');const trees=document.getElementById('trees-canvas');if(rivals)rivals.style.opacity='0';if(trees)trees.style.opacity='0.95';setTimeout(()=>{const dust=document.getElementById('dust-canvas');dust.style.opacity='0.6';dust.style.transform='scale(1.0)';setTimeout(()=>{dust.style.opacity='0';dust.style.transform='scale(1.2)';},270);},PAYLOAD.timing.dustOffsetFromJumpApexMs);});sceneBus.addEventListener('landing_complete',()=>{setTimeout(()=>{const cp=document.getElementById('checkpoint-text');cp.textContent=PAYLOAD.checkpointText;cp.classList.add('visible');emit('checkpoint_text_shown',{});},PAYLOAD.timing.checkpointOffsetAfterLandingMs);setTimeout(()=>{document.getElementById('fade-overlay').classList.add('visible');},PAYLOAD.timing.checkpointOffsetAfterLandingMs+PAYLOAD.timing.checkpointHoldMs+200);});}
function setupTimeline(){const tracks=PAYLOAD.tracks;const T=id=>tracks.find(t=>t.phase===id);sceneBus.addEventListener('scene_entry',()=>{PLAYER.awaitingEvent=null;startTrack(T('running_entry'));});setTimeout(()=>{const mt=document.getElementById('mission-text');mt.textContent=PAYLOAD.missionText;mt.classList.add('visible');emit('mission_text_shown',{});},PAYLOAD.timing.missionTextAppearsMs);sceneBus.addEventListener('mission_text_shown',()=>{PLAYER.awaitingEvent='tool_clicked';startTrack(T('standing_wait'));});}
(function(){const NEXT_PAGE="./M7.html";const MISSION_ID="M6";const SLOT_POINTS={A:100,B:125,C:150};let lastSlot="A";try{const score=parseInt(localStorage.getItem('emerald_score')||'0',10);const el=document.getElementById('score-display');if(el)el.textContent=MISSION_ID+' · ניקוד: '+score;}catch(e){}document.addEventListener('tool_clicked',(e)=>{if(e.detail&&e.detail.slot)lastSlot=e.detail.slot;});document.addEventListener('checkpoint_text_shown',()=>{try{const score=parseInt(localStorage.getItem('emerald_score')||'0',10);localStorage.setItem('emerald_score',String(score+(SLOT_POINTS[lastSlot]||100)));const prog=JSON.parse(localStorage.getItem('emerald_progress')||'[]');if(!prog.includes(MISSION_ID))prog.push(MISSION_ID);localStorage.setItem('emerald_progress',JSON.stringify(prog));}catch(e){}setTimeout(()=>{window.location.href=NEXT_PAGE;},2500);},{once:true});})();
async function init(){bindSoundEvents();setupBgPhaseSwap();chromaCanvasFromVideo(document.getElementById('player-canvas'),()=>activePoseVideo);chromaCanvasFromImage(document.getElementById('rivals-canvas'),document.getElementById('rivals-img'));chromaCanvasFromImage(document.getElementById('trees-canvas'),document.getElementById('trees-img'));chromaCanvasFromImage(document.getElementById('dust-canvas'),document.getElementById('dust-img'));await preloadAllPoses();buildTools();setupSequence();setupTimeline();requestAnimationFrame(poseRafTick);document.getElementById('bg-phase-1').play().catch(()=>{});document.getElementById('bg-phase-2').play().catch(()=>{});emit('scene_entry',{});}
document.addEventListener('DOMContentLoaded',init);
</script>
