name: Gemini Regen (tools + bgs)

on:
  workflow_dispatch: {}
  schedule:
    # Daily at 03:05 UTC (06:05 Israel) — Imagen quota resets at midnight PT.
    - cron: "5 3 * * *"

concurrency:
  group: gemini-regen
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Gemini regen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          python pipeline/gemini_regen_ci.py

      - name: Commit regen outputs
        if: always()
        run: |
          git config user.name  "gemini-regen-bot"
          git config user.email "gemini-regen-bot@users.noreply.github.com"
          git add pipeline/review/tools_qa_gemini_ci/ pipeline/gemini_regen_ci_state.json || true
          if git diff --staged --quiet; then
            echo "no regen output to commit"
          else
            git commit -m "gemini-regen: nightly retry"
            git push
          fi

      - name: Upload regen output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-regen-output
          path: |
            pipeline/review/tools_qa_gemini_ci/
            pipeline/gemini_regen_ci_state.json
          if-no-files-found: warn
          retention-days: 30
