name: Content Audit (integrated)

on:
  workflow_dispatch: {}
  schedule:
    # Every 6 hours — cheap, stdlib-only script.
    - cron: "0 */6 * * *"

concurrency:
  group: content-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run integrated audit
        run: |
          python pipeline/integrated_audit.py

      - name: Commit audit result
        if: always()
        run: |
          git config user.name  "audit-bot"
          git config user.email "audit-bot@users.noreply.github.com"
          git add pipeline/review/integrated_audit.json || true
          if git diff --staged --quiet; then
            echo "no audit changes"
          else
            git commit -m "audit: integrated_audit refresh"
            git push
          fi

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrated-audit
          path: pipeline/review/integrated_audit.json
          if-no-files-found: warn
          retention-days: 14
