name: Shutterstock 5-Agent Pipeline

on:
  workflow_dispatch:
    inputs:
      categories:
        description: "Which categories to fetch"
        required: true
        default: "both"
        type: choice
        options: [scenery, tools, both]
      only:
        description: "Only these slugs (comma list). Empty = all."
        required: false
        default: ""
      force:
        description: "Re-run items even if already present on disk"
        required: false
        default: false
        type: boolean
      limit:
        description: "Stop after this many items (0 = no limit)"
        required: false
        default: "0"

concurrency:
  group: shutterstock-pipeline
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run orchestrator (master -> searcher -> result_checker -> downloader -> download_checker)
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SHUTTERSTOCK_TOKEN: ${{ secrets.SHUTTERSTOCK_TOKEN }}
        run: |
          if [ "${{ inputs.categories }}" = "both" ]; then
            ARGS="--categories tools scenery"
          else
            ARGS="--categories ${{ inputs.categories }}"
          fi
          if [ -n "${{ inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ inputs.only }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ inputs.limit }}" != "0" ] && [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          echo "running: python pipeline/shutterstock_orchestrator.py $ARGS"
          python pipeline/shutterstock_orchestrator.py $ARGS

      - name: Commit results
        if: always()
        run: |
          git config user.name  "shutterstock-bot"
          git config user.email "shutterstock-bot@users.noreply.github.com"
          git add pipeline/review/shutterstock/ || true
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "shutterstock: 5-agent pipeline run (categories=${{ inputs.categories }})"
            # Pull with rebase before push to avoid race with other bots
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi

      - name: Upload results as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shutterstock-review-${{ github.run_id }}
          path: pipeline/review/shutterstock/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload per-item ledgers as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shutterstock-ledger-${{ github.run_id }}
          path: pipeline/staging/shutterstock/ledger/
          if-no-files-found: warn
          retention-days: 30
